  --bg-soft:#F6EEFA;
  --body:#5A4A68;
  --card:#FFFFFF;
  --grad:linear-gradient(120deg,#E0189F 0%,#8B2FC9 55%,#14C2AD 130%);
  --shadow:0 12px 34px rgba(51,14,77,.12);
  --radius:22px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Instrument Sans',sans-serif;color:var(--body);background:var(--bg);line-height:1.65;font-size:17px;overflow-x:hidden}
h1,h2,h3{font-family:'Unbounded',sans-serif;color:var(--ink);line-height:1.18;letter-spacing:-.01em}
img{max-width:100%;display:block}
.wrap{max-width:1120px;margin:0 auto;padding:0 24px}
section{padding:92px 0}
.eyebrow{display:inline-block;font-family:'Unbounded';font-size:12px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--magenta);background:rgba(224,24,159,.08);padding:8px 16px;border-radius:100px;margin-bottom:20px}
.btn{display:inline-flex;align-items:center;gap:10px;font-family:'Instrument Sans';font-weight:700;font-size:17px;padding:17px 32px;border-radius:100px;text-decoration:none;transition:transform .18s ease, box-shadow .18s ease;cursor:pointer;border:none;position:relative;overflow:hidden}
.btn:hover{transform:translateY(-3px) scale(1.02)}
.btn-primary{background:linear-gradient(120deg,#E0189F,#8B2FC9);background-size:160% 160%;color:#fff;box-shadow:0 10px 28px rgba(224,24,159,.40);animation:btnGlow 3.5s ease infinite}
@keyframes btnGlow{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.btn-primary:hover{box-shadow:0 14px 38px rgba(224,24,159,.5)}
.btn-wa{background:var(--wa);color:#fff;box-shadow:0 10px 28px rgba(37,211,102,.38)}
.btn-note{font-size:13.5px;color:var(--body);margin-top:12px;opacity:.85}

.rv{opacity:0;transform:translateY(26px);transition:opacity .7s ease, transform .7s ease}
.rv.in{opacity:1;transform:none}
.rv-d1{transition-delay:.1s}.rv-d2{transition-delay:.2s}.rv-d3{transition-delay:.3s}

nav{position:sticky;top:0;z-index:50;background:rgba(253,250,254,.88);backdrop-filter:blur(14px);border-bottom:1px solid rgba(51,14,77,.07)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;max-width:1120px;margin:0 auto}
.nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-brand img{height:40px;width:auto}
.nav-brand span{font-family:'Unbounded';font-weight:800;font-size:18px;color:var(--ink)}
.nav-right{display:flex;align-items:center;gap:14px}
.lang-toggle{display:flex;border:1.5px solid rgba(51,14,77,.15);border-radius:100px;overflow:hidden;background:#fff}
.lang-toggle button{border:none;background:transparent;padding:8px 15px;font-weight:700;font-size:14px;color:var(--body);cursor:pointer;font-family:'Instrument Sans';transition:background .15s}
.lang-toggle button.active{background:var(--ink);color:#fff}
.nav-cta{font-size:15px;padding:11px 22px}
@media(max-width:640px){.nav-cta{display:none}.nav-brand span{display:none}}

.hero{padding:76px 0 100px;position:relative;background:
  radial-gradient(720px 420px at 88% -5%, rgba(139,47,201,.13), transparent 60%),
  radial-gradient(620px 420px at -5% 105%, rgba(20,194,173,.10), transparent 60%)}
.float-emoji{position:absolute;font-size:34px;opacity:.16;animation:floaty 7s ease-in-out infinite;pointer-events:none;user-select:none}
@keyframes floaty{0%,100%{transform:translateY(0) rotate(-6deg)}50%{transform:translateY(-22px) rotate(8deg)}}
.hero-grid{display:grid;grid-template-columns:1.12fr .88fr;gap:56px;align-items:center;position:relative}
@media(max-width:880px){.hero-grid{grid-template-columns:1fr}}
.hero h1{font-size:clamp(30px,4.4vw,52px);font-weight:900;margin-bottom:24px}
.hero h1 .hl{background:var(--grad);background-size:220% 220%;-webkit-background-clip:text;background-clip:text;color:transparent;animation:gradShift 5s ease infinite}
@keyframes gradShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.hero p.sub{font-size:19px;margin-bottom:32px;max-width:540px}
.badge-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:26px}
.badge{display:inline-flex;align-items:center;gap:7px;font-size:13.5px;font-weight:700;color:var(--ink);background:#fff;border:1px solid rgba(51,14,77,.10);border-radius:100px;padding:8px 15px;box-shadow:0 3px 10px rgba(51,14,77,.06)}
.badge .dot{width:8px;height:8px;border-radius:50%;background:var(--teal);animation:pulseDot 2s ease infinite}
@keyframes pulseDot{0%,100%{box-shadow:0 0 0 0 rgba(20,194,173,.5)}50%{box-shadow:0 0 0 6px rgba(20,194,173,0)}}

.phone-wrap{position:relative}
.phone{width:302px;margin:0 auto;background:#20092F;border-radius:40px;padding:12px;box-shadow:0 34px 80px rgba(51,14,77,.32);animation:phoneFloat 6s ease-in-out infinite}
@keyframes phoneFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.phone-screen{background:#fff;border-radius:30px;overflow:hidden;min-height:490px;display:flex;flex-direction:column}
.phone-top{background:var(--grad);background-size:200% 200%;animation:gradShift 6s ease infinite;padding:24px 18px 20px;text-align:center;color:#fff}
.phone-top .rest-name{font-family:'Unbounded';font-weight:700;font-size:15px}
.phone-top .rest-sub{font-size:12.5px;opacity:.88}
.demo-body{padding:28px 20px;flex:1;display:flex;flex-direction:column;align-items:center;text-align:center}
.demo-q{font-weight:700;color:var(--ink);font-size:16.5px;margin-bottom:20px}
.stars{display:flex;gap:8px;margin-bottom:24px}
.star{font-size:36px;cursor:pointer;color:#E9E0F0;transition:transform .15s ease,color .15s ease;background:none;border:none;line-height:1;animation:starNudge 2.6s ease infinite}
.star:nth-child(2){animation-delay:.12s}.star:nth-child(3){animation-delay:.24s}.star:nth-child(4){animation-delay:.36s}.star:nth-child(5){animation-delay:.48s}
@keyframes starNudge{0%,88%,100%{transform:scale(1)}93%{transform:scale(1.12)}}
.star.lit{color:var(--gold);text-shadow:0 3px 12px rgba(245,179,1,.45);animation:none}
.star:hover{transform:scale(1.22)}
.demo-result{opacity:0;transform:translateY(8px);transition:all .35s ease;width:100%}
.demo-result.show{opacity:1;transform:translateY(0)}
.route-card{border-radius:16px;padding:18px 16px;font-size:14px;font-weight:600;line-height:1.5}
.route-google{background:#EDF9F1;border:1.5px solid #ADE3C3;color:#1E7A46}
.route-wa{background:#FFF4E6;border:1.5px solid #F5D3A2;color:#9A5B00}
.route-card .route-icon{font-size:28px;margin-bottom:8px}
.demo-hint{font-size:12.5px;color:var(--body);margin-top:auto;padding-top:18px;opacity:.7}
.demo-caption{text-align:center;font-size:14px;color:var(--body);margin-top:20px;font-weight:600}

.pain{background:var(--ink);color:#DACDE7;position:relative;overflow:hidden}
.pain::before{content:"";position:absolute;inset:0;background:radial-gradient(500px 300px at 90% 10%, rgba(224,24,159,.18), transparent 65%)}
.pain .wrap{position:relative}
.pain h2{color:#fff;font-size:clamp(24px,3.4vw,38px);margin-bottom:16px}
.pain .lead{font-size:18px;max-width:640px;margin-bottom:42px}
.pain-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px}
@media(max-width:760px){.pain-grid{grid-template-columns:1fr}}
.pain-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.10);border-radius:var(--radius);padding:28px;transition:transform .2s ease, background .2s ease}
.pain-card:hover{transform:translateY(-5px);background:rgba(255,255,255,.09)}
.pain-card .pi{font-size:30px;margin-bottom:12px}
.pain-card h3{color:#fff;font-size:16.5px;margin-bottom:10px}
.pain-card p{font-size:15.5px}
.pain-close{margin-top:44px;font-size:20px;font-weight:700;color:#fff}
.pain-close em{background:linear-gradient(120deg,#F686D0,#7EE8DA);-webkit-background-clip:text;background-clip:text;color:transparent;font-style:normal}

.pillars{background:var(--bg-soft)}
.sec-head{text-align:center;max-width:720px;margin:0 auto 60px}
.sec-head h2{font-size:clamp(24px,3.4vw,40px);margin-bottom:14px}
.pillar{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:46px;margin-bottom:30px;transition:transform .2s ease, box-shadow .2s ease;border-top:5px solid transparent}
.pillar:hover{transform:translateY(-5px);box-shadow:0 20px 48px rgba(51,14,77,.16)}
.pillar:nth-of-type(1){border-top-color:var(--magenta)}
.pillar:nth-of-type(2){border-top-color:var(--purple)}
.pillar:nth-of-type(3){border-top-color:var(--teal)}
@media(max-width:820px){.pillar{grid-template-columns:1fr;padding:30px}}
.pillar-num{font-family:'Unbounded';font-weight:800;font-size:13px;color:var(--magenta);letter-spacing:.14em;margin-bottom:12px}
.pillar h3{font-size:22px;margin-bottom:8px}
.pillar .p-tag{font-weight:700;color:var(--purple);margin-bottom:16px;font-size:16px}
.pillar ul{list-style:none;margin:0 0 18px}
.pillar li{padding-left:32px;position:relative;margin-bottom:11px;font-size:16px}
.pillar li::before{content:"✓";position:absolute;left:0;top:1px;width:22px;height:22px;background:rgba(20,194,173,.14);color:var(--teal);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800}
.pillar .result{background:rgba(224,24,159,.06);border-left:4px solid var(--magenta);padding:14px 17px;border-radius:0 12px 12px 0;font-size:15px;font-weight:600;color:var(--ink)}
.pillar-visual{display:flex;justify-content:center}
.mock{background:linear-gradient(160deg,#F6EEFA,#EDDDF5);border-radius:var(--radius);padding:28px;width:100%;max-width:380px}
.chat-bub{background:#fff;border-radius:14px 14px 14px 4px;padding:13px 16px;font-size:14px;margin-bottom:10px;box-shadow:0 3px 10px rgba(51,14,77,.07);color:var(--ink)}
.chat-bub.me{background:#DCF8C6;border-radius:14px 14px 4px 14px;margin-left:36px}
.chat-time{font-size:11px;color:var(--body);opacity:.6;text-align:right;margin-top:2px}
.maps-mock{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 3px 12px rgba(51,14,77,.09)}
.maps-row{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid #F1E8F6;font-size:14px}
.maps-row .rank{font-weight:800;font-family:'Unbounded';color:var(--body);width:22px;font-size:15px}
.maps-row.you{background:linear-gradient(90deg,rgba(224,24,159,.08),rgba(139,47,201,.05))}
.maps-row.you .rank{color:var(--magenta)}
.maps-row .rname{font-weight:700;color:var(--ink)}
.maps-row .rstars{font-size:12px;color:var(--gold)}
.maps-row .you-tag{margin-left:auto;font-size:11px;font-weight:800;color:#fff;background:linear-gradient(120deg,#E0189F,#8B2FC9);padding:4px 10px;border-radius:100px;font-family:'Unbounded'}

/* HOW IT WORKS */
.how{background:var(--bg)}
.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
@media(max-width:760px){.steps{grid-template-columns:1fr}}
.step{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:32px 26px;transition:transform .2s ease}
.step:hover{transform:translateY(-5px)}
.step-day{display:inline-block;font-family:'Unbounded';font-weight:800;font-size:12px;letter-spacing:.1em;color:#fff;background:linear-gradient(120deg,#E0189F,#8B2FC9);padding:7px 15px;border-radius:100px;margin-bottom:16px}
.step h3{font-size:17px;margin-bottom:10px}
.step p{font-size:15.5px}
.step .step-ico{font-size:32px;margin-bottom:14px}

.offer-sec{background:var(--bg-soft)}
.offer-card{max-width:780px;margin:0 auto;background:var(--card);border-radius:30px;box-shadow:0 28px 70px rgba(51,14,77,.16);overflow:hidden;text-align:center;position:relative}
.offer-top{background:var(--grad);background-size:200% 200%;animation:gradShift 6s ease infinite;color:#fff;padding:20px;font-weight:800;font-family:'Unbounded';font-size:15px;letter-spacing:.05em}
.offer-body{padding:50px 42px}
@media(max-width:640px){.offer-body{padding:36px 22px}}
.offer-body h2{font-size:clamp(22px,3vw,32px);margin-bottom:10px}
.price-row{display:flex;align-items:baseline;justify-content:center;gap:8px;margin:8px 0 4px}
.price{font-family:'Unbounded';font-weight:900;font-size:64px;background:var(--grad);background-size:200% 200%;-webkit-background-clip:text;background-clip:text;color:transparent;animation:gradShift 5s ease infinite}
.price-per{font-size:18px;font-weight:600}
.price-sub{font-size:15px;margin-bottom:28px}
.promise{background:var(--bg-soft);border-radius:18px;padding:24px 28px;font-size:17px;font-weight:600;color:var(--ink);margin-bottom:30px;line-height:1.6;border:1.5px dashed rgba(139,47,201,.3)}
.offer-list{list-style:none;text-align:left;max-width:500px;margin:0 auto 32px}
.offer-list li{padding-left:34px;position:relative;margin-bottom:13px;font-size:16px}
.offer-list li::before{content:"✓";position:absolute;left:0;width:23px;height:23px;background:rgba(20,194,173,.14);color:var(--teal);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800}

.about{background:var(--bg)}
.about-grid{display:grid;grid-template-columns:340px 1fr;gap:56px;align-items:center}
@media(max-width:820px){.about-grid{grid-template-columns:1fr;text-align:center}}
.about-photo{border-radius:28px;overflow:hidden;box-shadow:var(--shadow);position:relative}
.about-photo::after{content:"";position:absolute;inset:0;border-radius:28px;border:4px solid transparent;background:var(--grad) border-box;-webkit-mask:linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude}
.about h2{font-size:clamp(22px,3vw,32px);margin-bottom:18px}
.about p{margin-bottom:16px;font-size:17px}
.about .sig{font-family:'Unbounded';font-weight:700;color:var(--ink);font-size:16px;line-height:1.5}

/* FAQ */
.faq{background:var(--bg-soft)}
.faq-list{max-width:760px;margin:0 auto}
.faq-item{background:var(--card);border-radius:16px;box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden}
.faq-q{width:100%;text-align:left;background:none;border:none;cursor:pointer;padding:20px 24px;font-family:'Instrument Sans';font-weight:700;font-size:16.5px;color:var(--ink);display:flex;justify-content:space-between;align-items:center;gap:16px}
.faq-q .chev{flex:none;width:26px;height:26px;border-radius:50%;background:rgba(224,24,159,.08);color:var(--magenta);display:flex;align-items:center;justify-content:center;font-size:15px;transition:transform .25s ease}
.faq-item.open .chev{transform:rotate(45deg)}
.faq-a{max-height:0;overflow:hidden;transition:max-height .3s ease}
.faq-a p{padding:0 24px 20px;font-size:15.5px}

.final{background:var(--ink);text-align:center;position:relative;overflow:hidden}
.final::before{content:"";position:absolute;inset:0;background:radial-gradient(640px 340px at 50% -10%, rgba(224,24,159,.30), transparent 70%)}
.final .wrap{position:relative}
.final h2{color:#fff;font-size:clamp(24px,3.4vw,38px);margin-bottom:16px}
.final p{color:#DACDE7;font-size:18px;max-width:620px;margin:0 auto 36px}
.final .cta-row{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.final .btn-note{color:#B9A3CC}

/* STICKY MOBILE CTA */
.sticky-cta{position:fixed;left:0;right:0;bottom:0;z-index:60;padding:12px 16px calc(12px + env(safe-area-inset-bottom));background:rgba(253,250,254,.95);backdrop-filter:blur(12px);border-top:1px solid rgba(51,14,77,.1);display:none;transform:translateY(110%);transition:transform .3s ease}
.sticky-cta.show{transform:none}
.sticky-cta .btn{width:100%;justify-content:center;font-size:16px;padding:14px}
@media(max-width:760px){.sticky-cta{display:block}}

footer{background:#230838;color:#A98FC0;padding:32px 0 90px;font-size:14px}
@media(min-width:761px){footer{padding-bottom:32px}}
.foot-inner{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px}
footer a{color:#DACDE7;text-decoration:none;margin-left:18px}
footer a:hover{text-decoration:underline}

@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}html{scroll-behavior:auto}.rv{opacity:1;transform:none}}
</style>
</head>
